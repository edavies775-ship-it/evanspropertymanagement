<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>EPM Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Jost:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Jost,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}

/* Header */
.header{background:#1a1a1a;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.header-title{color:#fff;font-size:1.1rem;font-weight:700}
.header-title span{color:#c9a84c}
.header-sub{color:#888;font-size:.75rem;margin-top:2px}

/* Month pills */
.month-bar{background:#fff;border-bottom:1.5px solid #e8e8e4;padding:12px 16px;display:flex;gap:8px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.month-bar::-webkit-scrollbar{display:none}
.mpill{background:#f0f0ec;border:none;border-radius:20px;padding:7px 16px;font-family:Jost,sans-serif;font-size:.8rem;font-weight:600;color:#555;cursor:pointer;white-space:nowrap;transition:background .15s,color .15s}
.mpill.active{background:#1a1a1a;color:#fff}

/* Page content */
.page{max-width:700px;margin:0 auto;padding:20px 16px 60px}

/* KPI row */
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px}
.kpi{background:#fff;border-radius:12px;padding:16px 12px;text-align:center;border:1.5px solid #e8e8e4}
.kpi-num{font-size:1.6rem;font-weight:700;color:#1a1a1a}
.kpi-lbl{font-size:.7rem;font-weight:600;color:#999;letter-spacing:.06em;text-transform:uppercase;margin-top:3px}

/* Cards */
.card{background:#fff;border-radius:12px;border:1.5px solid #e8e8e4;margin-bottom:16px;overflow:hidden}
.card-title{font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#1a1a1a;padding:14px 16px 10px;border-bottom:1px solid #f0f0ec;display:flex;align-items:center;gap:8px}
.card-title::before{content:'';display:block;width:3px;height:14px;background:#c9a84c;border-radius:2px}
.card-empty{padding:24px 16px;color:#bbb;font-size:.85rem;text-align:center}

/* Rank rows (properties + cleaners) */
.rank-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid #f5f5f0}
.rank-row:last-child{border-bottom:none}
.rank-n{font-size:.75rem;font-weight:700;color:#c9a84c;width:18px;text-align:center;flex-shrink:0}
.rank-body{flex:1;min-width:0}
.rank-name{font-size:.9rem;font-weight:600;color:#1a1a1a}
.rank-meta{font-size:.75rem;color:#999;margin-top:2px}
.rank-bar-wrap{height:4px;background:#f0f0ec;border-radius:2px;margin-top:5px}
.rank-bar{height:4px;background:#c9a84c;border-radius:2px;transition:width .4s}
.rank-val{font-size:.9rem;font-weight:700;color:#1a1a1a;flex-shrink:0}

/* Two column layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:520px){.two-col{grid-template-columns:1fr}}

/* Issues */
.issue-row{padding:12px 16px;border-bottom:1px solid #f5f5f0}
.issue-row:last-child{border-bottom:none}
.issue-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:5px}
.issue-prop{font-size:.85rem;font-weight:700;color:#1a1a1a}
.issue-date{font-size:.72rem;color:#bbb}
.issue-note{font-size:.82rem;color:#444;line-height:1.5}
.issue-meta{font-size:.72rem;color:#999;margin-top:4px}
.tag-urgent{display:inline-block;background:#fee;color:#c00;font-size:.65rem;font-weight:700;letter-spacing:.05em;padding:2px 7px;border-radius:10px;margin-right:5px;text-transform:uppercase}

/* Invoice section */
.inv-prop{margin-bottom:12px}
.inv-prop-name{font-size:.8rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#1a1a1a;padding:10px 16px;background:#fafaf8;border-bottom:1px solid #f0f0ec}
.inv-line{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid #f5f5f0;gap:8px}
.inv-line:last-child{border-bottom:none}
.inv-line-main{flex:1;min-width:0}
.inv-line-desc{font-size:.82rem;color:#1a1a1a}
.inv-line-meta{font-size:.72rem;color:#999;margin-top:2px}
.inv-line-amt{font-size:.9rem;font-weight:700;color:#1a1a1a;flex-shrink:0}
.inv-total-row{display:flex;justify-content:space-between;align-items:center;padding:11px 16px;background:#f5f5f0;font-weight:700;font-size:.9rem}
.inv-total-label{color:#555}
.inv-total-amt{color:#1a1a1a}

/* Loading */
.loading{text-align:center;padding:40px;color:#bbb;font-size:.9rem}
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header-title">Evans <span>Property Management</span></div>
    <div class="header-sub">Admin Dashboard</div>
  </div>
</div>

<div class="month-bar" id="month-bar"></div>

<div class="page">
  <div class="kpi-row" id="kpis"><div class="kpi"><div class="kpi-num">—</div><div class="kpi-lbl">Changeovers</div></div><div class="kpi"><div class="kpi-num">—</div><div class="kpi-lbl">Income</div></div><div class="kpi"><div class="kpi-num">—</div><div class="kpi-lbl">Hours</div></div></div>

  <div class="two-col">
    <div class="card" id="card-props">
      <div class="card-title">Top Properties</div>
      <div class="card-empty">Loading…</div>
    </div>
    <div class="card" id="card-cleaners">
      <div class="card-title">Top Cleaners</div>
      <div class="card-empty">Loading…</div>
    </div>
  </div>

  <div class="card" id="card-issues">
    <div class="card-title">Flagged Issues</div>
    <div class="card-empty">Loading…</div>
  </div>

  <div class="card" id="card-invoices">
    <div class="card-title">Invoices</div>
    <div class="card-empty">Select a month above to view invoices.</div>
  </div>
</div>

<script>
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycby6ude4tWpwxI2MChF8qdeNOptOm3lZDdDdVTWcrE_4FTgfGItQx9qKEIlIxCEuoTxq6Q/exec';
const PROPS_CFG={'Maes Dyfed':{rateType:'split',rateShort:130,rateLong:170,threshold:4,mgmtFee:80},'Arosfa':{rateType:'split',rateShort:130,rateLong:170,threshold:4,mgmtFee:99},'Teifi View':{rateType:'split',rateShort:110,rateLong:130,threshold:4,mgmtFee:null},'Ty Gladys':{rateType:'split',rateShort:125,rateLong:160,threshold:4,mgmtFee:79},'Ty Eufron':{rateType:'split',rateShort:150,rateLong:180,threshold:4,mgmtFee:79},'Brynhowell':{rateType:'flat',flatRate:250,mgmtFee:null},'Stambar':{rateType:'flat',flatRate:140,mgmtFee:null},'Ty Pinc':{rateType:'flat',flatRate:130,mgmtFee:null},'Cwm Hyfryd':{rateType:'allinc',flatRate:260,mgmtFee:null}};
const URGENT=/\b(leak|broken|water|urgent|emergency|flood|fire|electric|gas|smoke|mould|mold|pest|burst|crack|smell|sewer|boiler|heating|alarm)/i;

let changeovers=[], activePeriod='all';

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function money(n){return'£'+Math.round(n).toLocaleString('en-GB');}
function fmtDate(iso){if(!iso)return'';const d=new Date(iso);return isNaN(d)?iso:d.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});}
function getIncome(c){const m=String(c.Total||c.total||'').match(/[\d.]+/);return m?parseFloat(m[0])||0:0;}
function getHours(c){const h=parseFloat(c.Hours||c.hours||0);return isNaN(h)?0:h;}

function filtered(){
  if(activePeriod==='all')return changeovers.slice();
  const[yr,mo]=activePeriod.split('-').map(Number);
  const from=new Date(yr,mo-1,1), to=new Date(yr,mo,0,23,59,59);
  return changeovers.filter(c=>{
    const d=new Date(c.LoggedAt||c.Date||'');
    return !isNaN(d)&&d>=from&&d<=to;
  });
}

function buildMonthPills(){
  const bar=document.getElementById('month-bar');
  const now=new Date();
  let html='<button class="mpill'+(activePeriod==='all'?' active':'')+'" onclick="setPeriod(\'all\')">All time</button>';
  for(let i=0;i<8;i++){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const val=d.getFullYear()+'-'+(d.getMonth()+1);
    const label=d.toLocaleDateString('en-GB',{month:'short',year:'2-digit'});
    html+='<button class="mpill'+(activePeriod===val?' active':'')+'" onclick="setPeriod(\''+val+'\')">'+label+'</button>';
  }
  bar.innerHTML=html;
}

function setPeriod(v){activePeriod=v;buildMonthPills();renderAll();}

function renderAll(){
  const data=filtered();
  renderKpis(data);
  renderProperties(data);
  renderCleaners(data);
  renderIssues(data);
  renderInvoices(data);
}

function renderKpis(data){
  let income=0,hours=0;
  data.forEach(c=>{income+=getIncome(c);hours+=getHours(c);});
  document.getElementById('kpis').innerHTML=
    '<div class="kpi"><div class="kpi-num">'+data.length+'</div><div class="kpi-lbl">Changeovers</div></div>'+
    '<div class="kpi"><div class="kpi-num">'+money(income)+'</div><div class="kpi-lbl">Income</div></div>'+
    '<div class="kpi"><div class="kpi-num">'+(Math.round(hours*10)/10)+'h</div><div class="kpi-lbl">Hours</div></div>';
}

function renderProperties(data){
  const byProp={};
  data.forEach(c=>{
    const p=c.Property||'Unknown';
    if(!byProp[p])byProp[p]={cleans:0,income:0};
    byProp[p].cleans++;byProp[p].income+=getIncome(c);
  });
  const rows=Object.entries(byProp).sort((a,b)=>b[1].income-a[1].income);
  const card=document.getElementById('card-props');
  if(!rows.length){card.innerHTML='<div class="card-title">Top Properties</div><div class="card-empty">No data yet.</div>';return;}
  const maxInc=rows[0][1].income||1;
  card.innerHTML='<div class="card-title">Top Properties</div>'+rows.map(([p,v],i)=>`
    <div class="rank-row">
      <div class="rank-n">${i+1}</div>
      <div class="rank-body">
        <div class="rank-name">${esc(p)}</div>
        <div class="rank-meta">${v.cleans} clean${v.cleans!==1?'s':''}</div>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(v.income/maxInc*100)}%"></div></div>
      </div>
      <div class="rank-val">${money(v.income)}</div>
    </div>`).join('');
}

function renderCleaners(data){
  const byCleaner={};
  data.forEach(c=>{
    const n=(c.Cleaner||c.cleaner||'Unknown').trim()||'Unknown';
    if(!byCleaner[n])byCleaner[n]={hours:0,cleans:0};
    byCleaner[n].hours+=getHours(c);byCleaner[n].cleans++;
  });
  const rows=Object.entries(byCleaner).sort((a,b)=>b[1].hours-a[1].hours);
  const card=document.getElementById('card-cleaners');
  if(!rows.length){card.innerHTML='<div class="card-title">Top Cleaners</div><div class="card-empty">No data yet.</div>';return;}
  const maxHrs=rows[0][1].hours||1;
  card.innerHTML='<div class="card-title">Top Cleaners</div>'+rows.map(([n,v],i)=>`
    <div class="rank-row">
      <div class="rank-n">${i+1}</div>
      <div class="rank-body">
        <div class="rank-name">${esc(n)}</div>
        <div class="rank-meta">${v.cleans} clean${v.cleans!==1?'s':''}</div>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${Math.round(v.hours/maxHrs*100)}%"></div></div>
      </div>
      <div class="rank-val">${Math.round(v.hours*10)/10}h</div>
    </div>`).join('');
}

function renderIssues(data){
  const issues=data.filter(c=>(c.Notes||c.notes||'').trim());
  const card=document.getElementById('card-issues');
  if(!issues.length){card.innerHTML='<div class="card-title">Flagged Issues</div><div class="card-empty">No issues flagged in this period.</div>';return;}
  card.innerHTML='<div class="card-title">Flagged Issues</div>'+issues.map(c=>{
    const note=(c.Notes||c.notes||'').trim();
    const urgent=URGENT.test(note);
    return`<div class="issue-row">
      <div class="issue-top">
        <div class="issue-prop">${urgent?'<span class="tag-urgent">Urgent</span>':''} ${esc(c.Property||'')}</div>
        <div class="issue-date">${fmtDate(c.LoggedAt||c.Date||'')}</div>
      </div>
      <div class="issue-note">${esc(note)}</div>
      <div class="issue-meta">${esc(c.Cleaner||'')}${c.Guest?' · '+esc(c.Guest):''}</div>
    </div>`;
  }).join('');
}

function renderInvoices(data){
  const card=document.getElementById('card-invoices');
  if(activePeriod==='all'){card.innerHTML='<div class="card-title">Invoices</div><div class="card-empty">Select a month above to view invoices.</div>';return;}
  if(!data.length){card.innerHTML='<div class="card-title">Invoices</div><div class="card-empty">No changeovers in this period.</div>';return;}

  const byProp={};
  data.forEach(c=>{
    const p=c.Property||'Unknown';
    if(!byProp[p])byProp[p]=[];
    byProp[p].push(c);
  });

  let html='<div class="card-title">Invoices</div>';
  Object.entries(byProp).sort().forEach(([prop,rows])=>{
    let total=0;
    const lines=rows.map(c=>{
      const inc=getIncome(c);
      total+=inc;
      const extras=parseFloat(c.ExtrasTotal||0)||0;
      const rate=String(c.Rate||'').trim();
      const extraStr=extras>0?' + £'+extras.toFixed(0)+' extras':'';
      const hrs=getHours(c);
      return`<div class="inv-line">
        <div class="inv-line-main">
          <div class="inv-line-desc">${esc(c.Guest||'Guest')} · ${esc(c.StayType||c.stayType||'')} ${rate?'· '+esc(rate):''}</div>
          <div class="inv-line-meta">${fmtDate(c.LoggedAt||'')} · ${esc(c.Cleaner||'')} · ${hrs}h${extraStr}</div>
        </div>
        <div class="inv-line-amt">£${inc.toFixed(0)}</div>
      </div>`;
    }).join('');
    html+=`<div class="inv-prop">
      <div class="inv-prop-name">${esc(prop)}</div>
      ${lines}
      <div class="inv-total-row"><span class="inv-total-label">Total</span><span class="inv-total-amt">${money(total)}</span></div>
    </div>`;
  });
  card.innerHTML=html;
}

async function loadData(){
  try{
    const res=await fetch(APPS_SCRIPT_URL+'?action=changeovers');
    const cd=await res.json();
    changeovers=Array.isArray(cd)?cd:(cd.data||[]);
    // Default to current month
    const now=new Date();
    activePeriod=now.getFullYear()+'-'+(now.getMonth()+1);
    buildMonthPills();
    renderAll();
  }catch(e){
    document.getElementById('card-issues').innerHTML='<div class="card-title">Flagged Issues</div><div class="card-empty">Failed to load data. Check connection.</div>';
  }
}

loadData();
</script>
</body>
</html>
